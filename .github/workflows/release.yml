name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync brand assets
        run: npm run sync:brand

      - name: Build macOS installer (Universal)
        run: npm run build && npx electron-builder --mac --universal

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dist
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/latest-mac.yml

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run pack:win

      - uses: actions/upload-artifact@v4
        with:
          name: win-dist
          if-no-files-found: error
          path: |
            release/*.exe
            release/latest.yml

  publish:
    needs: [build-mac, build-win]
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble release directory
        shell: bash
        run: |
          mkdir -p release
          cp artifacts/mac-dist/* release/
          cp artifacts/win-dist/* release/
          ls -lah release

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(node -p "require('./package.json').version")
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync website release manifests
        env:
          PETORY_RELEASE_ASSET_BASE: https://github.com/${{ github.repository }}/releases/download/${{ steps.version.outputs.tag }}
        run: |
          npm run release:prepare

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Petory ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.zip
            release/*.exe
            website/releases/latest.json
            website/releases/latest-mac.yml
            website/releases/latest.yml

      - name: Commit release feed updates
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website/releases/
          if git diff --cached --quiet; then
            echo "No release feed changes to commit."
            exit 0
          fi
          git commit -m "chore: sync release feeds for ${{ steps.version.outputs.tag }}"
          git push origin HEAD:main

  mirror-downloads:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Download release installers
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.publish.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release
          node scripts/download-release-installers.mjs "${TAG}" release
          ls -lah release

      - name: Mirror installers to VPS
        env:
          PETORY_DEPLOY_HOST: ${{ secrets.PETORY_DEPLOY_HOST || vars.PETORY_DEPLOY_HOST || '165.154.203.52' }}
          PETORY_DEPLOY_USER: ${{ secrets.PETORY_DEPLOY_USER || vars.PETORY_DEPLOY_USER || 'ubuntu' }}
          PETORY_DEPLOY_DOWNLOADS: ${{ secrets.PETORY_DEPLOY_DOWNLOADS || vars.PETORY_DEPLOY_DOWNLOADS || '/home/ubuntu/apps/petory/current/deploy/server/downloads' }}
          PETORY_DEPLOY_SSH_KEY: ${{ secrets.PETORY_DEPLOY_SSH_KEY }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${PETORY_DEPLOY_SSH_KEY}" ]]; then
            echo "::notice::PETORY_DEPLOY_SSH_KEY is not configured; skipping VPS download mirror."
            exit 0
          fi

          HOST="${PETORY_DEPLOY_HOST}"
          USER="${PETORY_DEPLOY_USER}"
          if [[ "${HOST}" == *@* ]]; then
            USER="${HOST%@*}"
            HOST="${HOST#*@}"
          fi

          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${PETORY_DEPLOY_SSH_KEY}" > ~/.ssh/petory_deploy_key
          chmod 600 ~/.ssh/petory_deploy_key
          ssh-keyscan -H "${HOST}" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/petory_deploy_key -o IdentitiesOnly=yes "${USER}@${HOST}" "mkdir -p '${PETORY_DEPLOY_DOWNLOADS}'"
          scp -i ~/.ssh/petory_deploy_key -o IdentitiesOnly=yes release/Petory-*.dmg release/Petory-Setup-*.exe "${USER}@${HOST}:${PETORY_DEPLOY_DOWNLOADS}/"
